apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-scheduling
  namespace: scheduling
  labels:
    app: appointment-scheduling
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-scheduling
  template:
    metadata:
      labels:
        app: appointment-scheduling
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: app
          image: uphill/appointment-scheduling:latest
          imagePullPolicy: Never # Remove it in case wants to pull from docker registry
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: appointment-scheduling-config
          # Actuator-backed Kubernetes probes. Liveness restarts a wedged pod;
          # readiness gates traffic until the context is fully up.
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
