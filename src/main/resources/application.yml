spring:
  application:
    name: appointment-scheduling
  datasource:
    url: jdbc:h2:mem:scheduling;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  modulith:
    events:
      republish-outstanding-events-on-restart: true

  # Virtual threads — cheap per-request threads for a blocking JPA workload that
  # must absorb thousands of requests/hour without a large platform-thread pool.
  threads:
    virtual:
      enabled: true

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

scheduling:
  notifications:
    transport: log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,modulith
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mail:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

server:
  port: 8080

logging:
  level:
    com.uphill.scheduling: INFO
    org.springframework.modulith: INFO