spring:
  datasource:
    url: jdbc:h2:mem:scheduling-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
  jpa:
    hibernate:
      ddl-auto: create-drop

# Keep notifications on the log transport during tests — no SMTP dependency.
scheduling:
  notifications:
    transport: log

logging:
  level:
    org.springframework.modulith: WARN
